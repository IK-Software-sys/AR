<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AR Controller</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; z-index: 1; }

        /* Floating Player Interface */
        #player-ui {
            position: absolute;
            pointer-events: auto; /* Buttons need to be clickable */
            display: none;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 15px;
            z-index: 1000;
            width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            flex-direction: column;
            gap: 8px;
        }

        .track-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        #track-name { font-size: 14px; font-weight: bold; color: #e5b13a; white-space: nowrap; overflow: hidden; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .btn { background: #333; border: none; color: white; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 12px; flex: 1; margin: 2px; }
        .btn:active { background: #e5b13a; color: black; }

        #input_video { display: none; }
        #ar-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; background: #e5b13a; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="input_video"></video>
    
    <div id="player-ui">
        <div class="track-label">Now Playing</div>
        <div id="track-name">Quantum Mechanics</div>
        <div class="controls">
            <button class="btn" onclick="togglePlay()" id="playBtn">Play</button>
            <button class="btn" onclick="nextTrack()">Next ⏭</button>
        </div>
    </div>

    <button id="ar-btn" onclick="startAR()">ACTIVATE AR</button>

    <model-viewer 
        id="ar-radio"
        src="old_radio.glb" 
        ar ar-modes="webxr" 
        camera-controls
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#ar-radio');
        const playerUI = document.getElementById('player-ui');
        const trackText = document.getElementById('track-name');
        const playBtn = document.getElementById('playBtn');

        // Audio Management
        const playlist = [
            { name: "Quantum Mechanics", file: "quantum-mechanics.mp3" },
            { name: "Die House (Cuphead)", file: "cuphead-ost-die-house-music.mp3" }
        ];
        let trackIdx = 0;
        let audio = new Audio(playlist[trackIdx].file);

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "Pause";
            } else {
                audio.pause();
                playBtn.innerText = "Play";
            }
        }

        function nextTrack() {
            audio.pause();
            trackIdx = (trackIdx + 1) % playlist.length;
            audio = new Audio(playlist[trackIdx].file);
            trackText.innerText = playlist[trackIdx].name;
            audio.play();
            playBtn.innerText = "Pause";
        }

        function startAR() {
            viewer.activateAR();
        }

        // Hand Tracking with MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                playerUI.style.display = 'flex';
                const landmarks = results.multiHandLandmarks[0];
                
                // UI Positioning (Follows the hand)
                const palm = landmarks[9];
                const x = palm.x * window.innerWidth;
                const y = palm.y * window.innerHeight;
                playerUI.style.left = `${x - 90}px`;
                playerUI.style.top = `${y - 120}px`;

                // 1. HORIZONTAL: Rotation (Yaw)
                const rotateY = (palm.x - 0.5) * 180;

                // 2. VERTICAL: Tilt (Pitch)
                // When hand is high (y is low), tilt back. When hand is low (y is high), tilt forward.
                const tiltX = (palm.y - 0.5) * 60 + 75; // Centers around 75deg

                // Apply combined Rotation and Tilt
                viewer.cameraOrbit = `${rotateY}deg ${tiltX}deg auto`;

                // 3. VERTICAL: Height Position
                // We map the Y hand coordinate to the model's vertical translation
                const verticalPos = (0.5 - palm.y) * 2; // Hand up = positive value
                viewer.style.transform = `translateY(${verticalPos * 50}px)`;

            } else {
                playerUI.style.display = 'none';
            }
        });

        const videoElement = document.getElementById('input_video');
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720, facingMode: "environment"
        });
        camera.start();
    </script>
</body>
</html>
