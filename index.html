<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio AR Hand Control</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }
        
        .ui-panel { position: absolute; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; pointer-events: none; }
        .ar-btn { background: #e5b13a; color: #000; padding: 20px 40px; border-radius: 50px; font-weight: bold; border: none; font-size: 18px; pointer-events: auto; }
        #status { font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 5px; }
        
        /* Hidden video for MediaPipe processing */
        #input_video { display: none; position: absolute; }
        #audio-indicator { position: absolute; top: 20px; right: 20px; background: rgba(0,255,0,0.3); padding: 10px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <video id="input_video"></video>
    <div id="audio-indicator">🎵 Playing: Quantum Mechanics</div>

    <model-viewer 
        id="ar-radio"
        src="old_radio.glb" 
        ar 
        ar-modes="webxr" 
        camera-controls 
        interaction-prompt="none"
        shadow-intensity="1">

        <div class="ui-panel">
            <div id="status">Initializing Hand Tracking...</div>
            <button slot="ar-button" class="ar-btn">OPEN AR CAMERA</button>
        </div>
    </model-viewer>

    <script>
        const viewer = document.querySelector('#ar-radio');
        const status = document.querySelector('#status');
        const audioIndicator = document.getElementById('audio-indicator');
        
        // Setup Audio
        const radioMusic = new Audio('quantum-mechanics.mp3');
        let isPinching = false;

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Helper to calculate distance for pinch
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 1. ROTATION LOGIC (Mapping Hand X to Model Rotation)
                const handX = landmarks[9].x; // Middle finger knuckle
                const rotationDeg = (handX - 0.5) * 180; 
                viewer.cameraOrbit = `${rotationDeg}deg 75deg auto`;

                // 2. PINCH LOGIC (Thumb tip [4] and Index tip [8])
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const pinchDist = getDistance(thumbTip, indexTip);

                if (pinchDist < 0.05) { // Threshold for a "click"
                    if (!isPinching) {
                        toggleAudio();
                        isPinching = true; 
                    }
                } else {
                    isPinching = false;
                }

                status.innerText = "Hand Detected: Controlling Radio";
            } else {
                status.innerText = "Hand not visible";
            }
        }

        function toggleAudio() {
            if (radioMusic.paused) {
                radioMusic.play();
                audioIndicator.style.display = "block";
            } else {
                radioMusic.pause();
                audioIndicator.style.display = "none";
            }
        }

        // Setup Camera for MediaPipe
        const videoElement = document.getElementById('input_video');
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480,
            facingMode: "environment" // Use back camera
        });
        camera.start();

        // Original Scaling Logic
        setInterval(() => {
            if (viewer.arTracking === 'tracking') {
                const orbit = viewer.getCameraOrbit();
                const dist = orbit.radius; 
                let dynamicScale = dist * 0.8; 
                dynamicScale = Math.min(Math.max(dynamicScale, 0.4), 3.5);
                viewer.scale = `${dynamicScale} ${dynamicScale} ${dynamicScale}`;
            }
        }, 100);
    </script>
</body>
</html>
