<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Radio - Real World Placement</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #css-container { position: absolute; top: 0; pointer-events: none; }
        
        /* UI Styling */
        .model-ui-wrapper {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transform: translate(-50%, -50%);
        }
        .controls button {
            background: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .controls button.active { background: #4CAF50; }
    </style>
</head>
<body>
    <div id="css-container"></div>
    <audio id="audio-player"></audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        let container, camera, scene, renderer, labelRenderer;
        let controller, reticle, radioGroup;
        let transformControl;

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Lighting for "Real" look
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // Renderer setup with XR enabled
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // 2D UI Renderer
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            document.getElementById('css-container').appendChild(labelRenderer.domElement);

            // Add the AR Button
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            radioGroup = new THREE.Group();
            scene.add(radioGroup);

            // Reticle (the square that shows where the radio will land)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Controller for placing the object
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Load Model
            const loader = new GLTFLoader();
            loader.load('old_radio.glb', (gltf) => {
                radioGroup.add(gltf.scene);
                radioGroup.visible = false; // Hide until user places it
                createUI();
            });

            // Transform Controls
            transformControl = new TransformControls(camera, renderer.domElement);
            scene.add(transformControl);

            window.addEventListener('resize', onWindowResize);
        }

        function createUI() {
            const songs = [
                { title: "Cuphead", src: "cuphead-ost-die-house-music.mp3" },
                { title: "Quantum", src: "Quantum Mechanics.mp3" }
            ];
            let currentIdx = 0;
            const audio = document.getElementById('audio-player');
            audio.src = songs[currentIdx].src;

            const div = document.createElement('div');
            div.className = 'model-ui-wrapper';
            div.innerHTML = `
                <div id="song-name" style="font-size:12px">${songs[currentIdx].title}</div>
                <div class="controls">
                    <button id="play">▶</button>
                    <button id="pause">⏸</button>
                    <button id="next">⏭</button>
                </div>
                <div class="controls">
                    <button id="m-move">Move</button>
                    <button id="m-rot">Rot</button>
                </div>
            `;

            const uiObj = new CSS2DObject(div);
            uiObj.position.set(0, 0.5, 0); // Position UI above radio
            radioGroup.add(uiObj);

            // Logic for buttons
            div.querySelector('#play').onclick = () => audio.play();
            div.querySelector('#pause').onclick = () => audio.pause();
            div.querySelector('#next').onclick = () => {
                currentIdx = (currentIdx + 1) % songs.length;
                audio.src = songs[currentIdx].src;
                div.querySelector('#song-name').innerText = songs[currentIdx].title;
                audio.play();
            };
            
            div.querySelector('#m-move').onclick = () => transformControl.setMode('translate');
            div.querySelector('#m-rot').onclick = () => transformControl.setMode('rotate');
        }

        function onSelect() {
            if (reticle.visible) {
                radioGroup.visible = true;
                radioGroup.position.setFromMatrixPosition(reticle.matrix);
                transformControl.attach(radioGroup);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();
                const hitTestSource = session.requestHitTestSource ? 
                    await session.requestHitTestSource({ space: referenceSpace }) : null;

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
    </script>
</body>
</html>
