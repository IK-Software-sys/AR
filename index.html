<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Radio Game</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Modernized Audio UI */
        #ui-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #00ffcc;
            border-radius: 15px;
            padding: 15px;
            color: white;
            text-align: center;
            z-index: 1000;
            display: none; /* Hidden until marker found */
        }
        .btn-row { display: flex; justify-content: space-around; margin-top: 10px; }
        button {
            background: #00ffcc;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui-overlay">
        <div id="track-name">Radio Off</div>
        <div class="btn-row">
            <button onclick="playMusic()">PLAY</button>
            <button onclick="pauseMusic()">PAUSE</button>
            <button onclick="nextMusic()">NEXT</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="radio-model" src="old_radio.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" id="radio-marker">
            
            <a-entity 
                id="radio-entity"
                gltf-model="#radio-model" 
                scale="1 1 1" 
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- Audio Logic ---
        const tracks = [
            { src: 'cuphead-ost-die-house-music.mp3', name: 'Cuphead - Die House' },
            { src: encodeURI('Quantum Mechanics.mp3'), name: 'Quantum Mechanics' }
        ];
        let currentIdx = 0;
        let audio = new Audio(tracks[currentIdx].src);

        const trackName = document.getElementById('track-name');
        const ui = document.getElementById('ui-overlay');
        const marker = document.getElementById('radio-marker');

        // Show UI only when marker is detected
        marker.addEventListener('markerFound', () => {
            ui.style.display = 'block';
            trackName.innerText = tracks[currentIdx].name;
        });

        marker.addEventListener('markerLost', () => {
            ui.style.display = 'none';
        });

        function playMusic() { audio.play(); }
        function pauseMusic() { audio.pause(); }
        function nextMusic() {
            audio.pause();
            currentIdx = (currentIdx + 1) % tracks.length;
            audio = new Audio(tracks[currentIdx].src);
            trackName.innerText = tracks[currentIdx].name;
            audio.play();
        }

        // --- Movement Fix ---
        // Instead of the arrows moving the radio, 
        // the radio is locked to the marker on your desk. 
        // You move your phone around the paper to see different angles.
    </script>
</body>
</html>
