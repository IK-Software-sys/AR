<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Android AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; }
        model-viewer { width: 100%; height: 100%; }
        
        .ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100;
        }

        .ar-btn {
            background: #fff; color: #000; padding: 20px 40px;
            border-radius: 50px; font-weight: bold; border: none; font-size: 18px;
            box-shadow: 0 5px 20px rgba(229, 177, 58, 0.4);
        }

        #logger {
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px;
            font-family: monospace; font-size: 11px; width: 80%; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="ctrl"
        src="./old_radio.glb" 
        ar 
        ar-modes="webxr scene-viewer" 
        camera-controls 
        ar-placement="floor"
        shadow-intensity="1">

        <div class="ui">
            <div id="logger">System Status: Waiting for user...</div>
            <button slot="ar-button" class="ar-btn">START CAMERA FEED</button>
        </div>

    </model-viewer>

    <script>
        const m = document.querySelector('#ctrl');
        const log = document.querySelector('#logger');

        // 1. Log when the radio model is actually ready
        m.addEventListener('load', () => {
            log.innerText = "✅ Radio Model Loaded. Ready for AR.";
        });

        // 2. Log if the AR fails to start
        m.addEventListener('ar-status', (event) => {
            log.innerText = "Status: " + event.detail.status;
            if (event.detail.status === 'failed') {
                log.innerText = "❌ FAILED: Check Camera Permissions or ARCore updates.";
            }
        });

        // 3. ML-Style Scaling Logic (Distance Based)
        setInterval(() => {
            if (m.arTracking === 'tracking') {
                const orbit = m.getCameraOrbit();
                const d = orbit.radius; 
                // Scaling factor: Object grows as you walk away to stay visible
                let s = d * 0.8; 
                s = Math.min(Math.max(s, 0.4), 3.0);
                m.scale = `${s} ${s} ${s}`;
                log.innerText = `📏 Distance: ${d.toFixed(2)}m | Scale: ${s.toFixed(2)}x`;
            }
        }, 100);

        // 4. Critical Error Catching
        m.addEventListener('error', (e) => {
            log.innerText = "❌ Error: Could not find 'old_radio.glb'";
        });
    </script>
</body>
</html>
