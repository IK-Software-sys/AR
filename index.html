<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Radio AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }

        /* Floating Interface */
        #hand-ui {
            position: absolute;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.1s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .track-info { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #e5b13a; }
        
        .pinch-indicator {
            width: 40px;
            height: 40px;
            border: 3px solid #e5b13a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.2s;
        }

        .pinching { background: #e5b13a; transform: scale(0.8); color: #000; }

        #status { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 12px;
        }

        #input_video { display: none; }
    </style>
</head>
<body>

    <video id="input_video"></video>
    <div id="status">Point camera at hand to control</div>

    <div id="hand-ui">
        <div class="glass-card">
            <div id="track-name" class="track-info">Quantum Mechanics</div>
            <div style="font-size: 10px;">PINCH TO SWAP / PLAY</div>
        </div>
        <div id="cursor" class="pinch-indicator">AR</div>
    </div>

    <model-viewer 
        id="ar-radio"
        src="old_radio.glb" 
        ar ar-modes="webxr" 
        camera-controls 
        shadow-intensity="1">
        <button slot="ar-button" style="background: #e5b13a; border-radius: 10px; border: none; padding: 15px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            LAUNCH AR
        </button>
    </model-viewer>

    <script>
        const viewer = document.querySelector('#ar-radio');
        const handUI = document.getElementById('hand-ui');
        const trackText = document.getElementById('track-name');
        const cursor = document.getElementById('cursor');

        // Audio Playlist
        const playlist = [
            { name: "Quantum Mechanics", file: "quantum-mechanics.mp3" },
            { name: "Die House (Cuphead)", file: "cuphead-ost-die-house-music.mp3" }
        ];
        let currentTrackIdx = 0;
        let audio = new Audio(playlist[currentTrackIdx].file);
        let isPinching = false;

        // Hand Tracking Logic
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handUI.style.display = 'flex';
                const landmarks = results.multiHandLandmarks[0];
                
                // Position UI near the Index Finger Tip
                const indexTip = landmarks[8];
                const x = indexTip.x * window.innerWidth;
                const y = indexTip.y * window.innerHeight;
                handUI.style.transform = `translate(${x}px, ${y}px)`;

                // Rotation Logic (mapped to hand position)
                const rot = (landmarks[9].x - 0.5) * 180;
                viewer.cameraOrbit = `${rot}deg 75deg auto`;

                // Pinch Logic (Thumb [4] to Index [8])
                const thumbTip = landmarks[4];
                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);

                if (dist < 0.04) {
                    if (!isPinching) {
                        isPinching = true;
                        cursor.classList.add('pinching');
                        handlePinchAction();
                    }
                } else {
                    isPinching = false;
                    cursor.classList.remove('pinching');
                }
            } else {
                handUI.style.display = 'none';
            }
        });

        function handlePinchAction() {
            // Toggle logic: If paused, play. If playing, switch track.
            if (audio.paused) {
                audio.play().catch(e => console.log("Unlock audio via screen tap first"));
            } else {
                audio.pause();
                currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
                audio = new Audio(playlist[currentTrackIdx].file);
                trackText.innerText = playlist[currentTrackIdx].name;
                audio.play();
            }
        }

        // Camera Start
        const videoElement = document.getElementById('input_video');
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720, facingMode: "environment"
        });
        camera.start();

        // One-time click to enable audio (Browser Security Requirement)
        document.body.addEventListener('click', () => {
            console.log("Audio Context Unlocked");
        }, { once: true });
    </script>
</body>
</html>
