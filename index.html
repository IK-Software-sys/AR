<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Radio Player</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #222;
      font-family: sans-serif;
      overflow: hidden;
    }
    
    /* Make the 3D viewer fill the entire mobile screen */
    model-viewer {
      width: 100%;
      height: 100%;
    }

    /* The hover UI attached to the 3D model */
    .music-interface {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      /* Centers the UI right above the hotspot point */
      transform: translate3d(-50%, -100%, 0); 
    }

    .track-info {
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      margin: 0;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      background: #e5b13a; /* A retro yellow to fit the Cuphead vibe */
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    button:active {
      background: #c29530;
    }
  </style>
</head>
<body>

  <model-viewer 
    src="old_radio.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    ar-placement="floor"
    shadow-intensity="1">
    
    <div slot="hotspot-music-ui" class="music-interface" data-position="0 0.6 0" data-normal="0 1 0">
      <div class="track-info" id="track-name">Die House</div>
      <div class="controls">
        <button id="play-pause-btn">Play</button>
        <button id="next-btn">Next</button>
      </div>
    </div>

  </model-viewer>

  <audio id="audio-player" src="cuphead-ost-die-house-music.mp3"></audio>

  <script>
    const audioPlayer = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const nextBtn = document.getElementById('next-btn');
    const trackNameDisplay = document.getElementById('track-name');
    
    // Array of the songs uploaded to your repository
    const playlist = [
      { name: "Die House", file: "cuphead-ost-die-house-music.mp3" },
      { name: "Quantum Mechanics", file: "quantum-mechanics.mp3" }
    ];
    
    let currentTrack = 0;
    let isPlaying = false;

    // Handle Play/Pause
    playPauseBtn.addEventListener('click', (e) => {
      e.preventDefault(); // Stops the click from accidentally moving the 3D model behind it
      
      if (isPlaying) {
        audioPlayer.pause();
        playPauseBtn.textContent = "Play";
      } else {
        audioPlayer.play();
        playPauseBtn.textContent = "Pause";
      }
      isPlaying = !isPlaying;
    });

    // Handle Next Song
    nextBtn.addEventListener('click', (e) => {
      e.preventDefault();
      
      // Move to next track, loop back to the start if at the end of the list
      currentTrack = (currentTrack + 1) % playlist.length;
      
      // Update audio source and UI text
      audioPlayer.src = playlist[currentTrack].file;
      trackNameDisplay.textContent = playlist[currentTrack].name;
      
      // If music was already playing, automatically start playing the new track
      if (isPlaying) {
        audioPlayer.play();
      }
    });

    // Reset the UI when a song naturally finishes
    audioPlayer.addEventListener('ended', () => {
      isPlaying = false;
      playPauseBtn.textContent = "Play";
    });
  </script>
</body>
</html>
