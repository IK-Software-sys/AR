<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage AR Radio</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* Simple Top Window Player */
        #static-player {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(40, 30, 20, 0.9);
            border: 2px solid #e5b13a;
            border-radius: 8px;
            padding: 15px;
            z-index: 2000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .info-box { flex-grow: 1; }
        #track-display { font-size: 14px; color: #e5b13a; font-weight: bold; margin-bottom: 4px; }
        .fx-tag { font-size: 10px; color: #888; text-transform: uppercase; }

        .btn-group { display: flex; gap: 10px; }
        .radio-btn { 
            background: #e5b13a; border: none; padding: 8px 15px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;
        }
        
        model-viewer { width: 100%; height: 100%; }
        #input_video { display: none; }
        #ar-launch { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2001; }
    </style>
</head>
<body>

    <video id="input_video"></video>

    <div id="static-player">
        <div class="info-box">
            <div id="track-display">Cuphead - Die House</div>
            <div class="fx-tag">Vintage Filter: ON</div>
        </div>
        <div class="btn-group">
            <button class="radio-btn" onclick="togglePlay()" id="playBtn">PLAY</button>
            <button class="radio-btn" onclick="nextTrack()">NEXT</button>
        </div>
    </div>

    <button id="ar-launch" class="radio-btn" onclick="document.querySelector('#ar-radio').activateAR()">OPEN AR CAMERA</button>

    <model-viewer 
        id="ar-radio"
        src="old_radio.glb" 
        ar ar-modes="webxr" 
        camera-controls
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#ar-radio');
        const trackDisplay = document.getElementById('track-display');
        const playBtn = document.getElementById('playBtn');

        // --- AUDIO ENGINE WITH OLD RADIO EFFECT ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let source;
        let biquadFilter;
        
        const playlist = [
            { name: "Die House (Cuphead)", file: "cuphead-ost-die-house-music.mp3" },
            { name: "Quantum Mechanics", file: "quantum-mechanics.mp3" }
        ];
        let trackIdx = 0;
        let audio = new Audio(playlist[trackIdx].file);
        audio.crossOrigin = "anonymous";

        function initAudioFX() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                source = audioCtx.createMediaElementSource(audio);
                
                // Bandpass Filter (Cuts highs and lows for that "thin" radio sound)
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "bandpass";
                biquadFilter.frequency.value = 1500; // Focus on mid-range
                biquadFilter.Q.value = 1.0;

                // Simple Distortion (Gain) for slight crackle
                const dist = audioCtx.createGain();
                dist.gain.value = 1.2;

                source.connect(biquadFilter);
                biquadFilter.connect(dist);
                dist.connect(audioCtx.destination);
            }
        }

        function togglePlay() {
            initAudioFX();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "PAUSE";
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
            }
        }

        function nextTrack() {
            audio.pause();
            trackIdx = (trackIdx + 1) % playlist.length;
            
            // Re-assign audio source
            audio.src = playlist[trackIdx].file;
            trackDisplay.innerText = playlist[trackIdx].name;
            
            audio.play();
            playBtn.innerText = "PAUSE";
        }

        // --- HAND TRACKING & MOTION ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const palm = landmarks[9];

                // 1. Horizontal Rotation (X movement)
                const rotateY = (palm.x - 0.5) * 180;

                // 2. Vertical Tilt (Y movement)
                const tiltX = (palm.y - 0.5) * 60 + 75; 

                // Apply to camera
                viewer.cameraOrbit = `${rotateY}deg ${tiltX}deg auto`;

                // 3. Physical Vertical Position (Up/Down)
                // Maps hand height to a CSS transform for "Actual AR" feel
                const verticalTranslation = (0.5 - palm.y) * 150; 
                viewer.style.transform = `translateY(${verticalTranslation}px)`;
            }
        });

        const videoElement = document.getElementById('input_video');
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720, facingMode: "environment"
        });
        camera.start();
    </script>
</body>
</html>
