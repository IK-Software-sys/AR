<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro AR Radio</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #shared-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Fixes the zoom issue */
            z-index: 1;
        }
        #hand-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 2; pointer-events: none;
        }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }
    </style>
</head>
<body>

    <video id="shared-video" autoplay playsinline></video>
    <canvas id="hand-canvas"></canvas>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true;">
        <a-assets>
            <a-asset-item id="radio-model" src="old_radio.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0" look-controls="enabled: false">
            <a-cursor fuse="true" fuse-timeout="1500" color="cyan" raycaster="objects: .clickable">
                <a-animation begin="fusing" easing="ease-in" attribute="scale" fill="forwards" from="1 1 1" to="0.1 0.1 0.1" dur="1500"></a-animation>
            </a-cursor>
        </a-camera>

        <a-entity id="radio-group" position="0 1.5 -2" visible="false">
            <a-entity gltf-model="#radio-model" scale="1 1 1" rotation="0 180 0"></a-entity>
            
            <a-sphere id="move-dot" radius="0.1" color="yellow" position="0.6 0 0" class="draggable"></a-sphere>

            <a-entity position="0 0.8 0">
                <a-plane class="clickable" width="0.4" height="0.15" color="#333" position="-0.45 0 0" text="value: Song 1; align: center" onclick="playSong('song1')"></a-plane>
                <a-plane class="clickable" width="0.4" height="0.15" color="#333" position="0 0 0" text="value: Song 2; align: center" onclick="playSong('song2')"></a-plane>
                <a-plane class="clickable" width="0.4" height="0.15" color="#222" position="0.45 0 0" text="value: Play; align: center" onclick="resumeAudio()"></a-plane>
                <a-plane class="clickable" width="0.4" height="0.15" color="#900" position="0 -0.25 0" text="value: Stop; align: center" onclick="pauseAudio()"></a-plane>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1"></a-light>
    </a-scene>

    <audio id="audio-song1" src="825653__1love__1love_synth_unkown-undercurrents-[AudioTrimmer.com].wav"></audio>
    <audio id="audio-song2" src="Quantum Mechanics.mp3"></audio>

    <script>
        const video = document.getElementById('shared-video');
        const canvasElement = document.getElementById('hand-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const radioGroup = document.getElementById('radio-group');
        let currentAudio = null;

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                const camera = new Camera(video, {
                    onFrame: async () => {
                        canvasElement.width = video.videoWidth;
                        canvasElement.height = video.videoHeight;
                        await hands.send({image: video});
                    }
                });
                camera.start();
            };
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 3});

                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];
                const tx = (indexTip.x * 4) - 2;
                const ty = (1 - indexTip.y) * 3;

                // 1. FIST TO SPAWN (Stay put)
                const isFist = landmarks[8].y > landmarks[6].y && landmarks[12].y > landmarks[10].y;
                if (isFist && !radioGroup.getAttribute('visible')) {
                    radioGroup.setAttribute('visible', 'true');
                    radioGroup.setAttribute('position', `${tx} ${ty} -2`);
                }

                // 2. PINCH MOVE-DOT TO DRAG
                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (dist < 0.05) {
                    radioGroup.setAttribute('position', `${tx} ${ty} -2`);
                }
            }
        });

        function playSong(id) {
            pauseAudio();
            currentAudio = document.getElementById('audio-' + id);
            currentAudio.play();
        }
        function pauseAudio() { if(currentAudio) currentAudio.pause(); }
        function resumeAudio() { if(currentAudio) currentAudio.play(); }

        init();
    </script>
</body>
</html>
