<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Lock AR Radio</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #static-player {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; background: rgba(20, 15, 10, 0.98);
            border: 2px solid #e5b13a; border-radius: 4px; padding: 12px;
            z-index: 2000; display: flex; justify-content: space-between; align-items: center;
        }

        #track-display { font-size: 12px; color: #e5b13a; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .btn-group { display: flex; gap: 8px; }
        
        .radio-btn { 
            background: #e5b13a; border: none; padding: 10px; 
            border-radius: 2px; cursor: pointer; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
        }

        .lock-active { background: #ff4444; color: white; }
        
        model-viewer { width: 100%; height: 100%; }
        #input_video { display: none; }

        /* Hidden AR button slot to satisfy model-viewer requirements without showing it */
        [slot="ar-button"] { display: none; }
    </style>
</head>
<body>

    <video id="input_video"></video>

    <div id="static-player">
        <div class="info-box">
            <div id="track-display">TRACK: Die House</div>
            <div id="lock-status" style="font-size: 9px; color: #888;">STATUS: HAND TRACKING</div>
        </div>
        <div class="btn-group">
            <button class="radio-btn" onclick="toggleLock()" id="lockBtn">🔓</button>
            <button class="radio-btn" onclick="togglePlay()" id="playBtn">PLAY</button>
            <button class="radio-btn" onclick="nextTrack()">NEXT</button>
        </div>
    </div>

    <model-viewer 
        id="ar-radio"
        src="old_radio.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#ar-radio');
        const trackDisplay = document.getElementById('track-display');
        const playBtn = document.getElementById('playBtn');
        const lockBtn = document.getElementById('lockBtn');
        const lockStatus = document.getElementById('lock-status');

        let isLocked = false;
        let audioCtx, source, biquadFilter, panner, gainNode;
        
        const playlist = [
            { name: "Die House (Cuphead)", file: "cuphead-ost-die-house-music.mp3" },
            { name: "Can You Hear The Music", file: "Can You Hear The Music.mp3" }
        ];
        let trackIdx = 0;
        let audio = new Audio(playlist[trackIdx].file);
        audio.loop = true;

        // Toggle Lock Logic
        function toggleLock() {
            isLocked = !isLocked;
            if (isLocked) {
                lockBtn.innerText = "🔒";
                lockBtn.classList.add('lock-active');
                lockStatus.innerText = "STATUS: SENSOR LOCKED (MOVE PHONE)";
                // Enable standard touch/gyro behavior by allowing viewer to handle inputs
                viewer.cameraControls = true; 
            } else {
                lockBtn.innerText = "🔓";
                lockBtn.classList.remove('lock-active');
                lockStatus.innerText = "STATUS: HAND TRACKING";
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                source = audioCtx.createMediaElementSource(audio);
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "bandpass";
                biquadFilter.frequency.value = 1600;
                panner = audioCtx.createPanner();
                panner.panningModel = 'HRTF';
                gainNode = audioCtx.createGain();

                source.connect(biquadFilter);
                biquadFilter.connect(panner);
                panner.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
        }

        function updateSpatialSound() {
            if (!panner || !gainNode) return;
            const orbit = viewer.getCameraOrbit(); 
            const theta = orbit.theta + Math.PI; 
            const zPos = -Math.cos(theta); 
            const xPos = Math.sin(theta);
            panner.setPosition(xPos, 0, zPos);
            const orientationFactor = (zPos + 1) / 2;
            gainNode.gain.setTargetAtTime(Math.max(0.15, orientationFactor), audioCtx.currentTime, 0.05);
            biquadFilter.frequency.setTargetAtTime(600 + (1400 * orientationFactor), audioCtx.currentTime, 0.05);
        }

        viewer.addEventListener('camera-change', updateSpatialSound);

        function togglePlay() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) { audio.play(); playBtn.innerText = "PAUSE"; } 
            else { audio.pause(); playBtn.innerText = "PLAY"; }
        }

        function nextTrack() {
            audio.pause();
            trackIdx = (trackIdx + 1) % playlist.length;
            audio.src = playlist[trackIdx].file;
            trackDisplay.innerText = "TRACK: " + playlist[trackIdx].name;
            audio.play();
            playBtn.innerText = "PAUSE";
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            // ONLY apply hand tracking if the lock is NOT active
            if (!isLocked && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const palm = results.multiHandLandmarks[0][9];
                const deg = (palm.x - 0.5) * 180;
                const tilt = (palm.y - 0.5) * 60 + 75;
                
                viewer.cameraOrbit = `${deg}deg ${tilt}deg auto`;
                
                const vPos = (0.5 - palm.y) * 150;
                viewer.style.transform = `translateY(${vPos}px)`;
            }
        });

        const videoElement = document.getElementById('input_video');
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720, facingMode: "environment"
        });
        camera.start();
        
        // Auto-start AR mode if possible on load (Note: most browsers still require a click)
        window.addEventListener('load', () => {
            // viewer.activateAR(); // Uncomment if you want to force AR entry immediately
        });
    </script>
</body>
</html>
