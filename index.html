<!DOCTYPE html>
<html>
<head>
  <title>Back Camera AR Radio</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; }
    #video-input { display: none; }
    #hand-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
      transform: scaleX(-1); /* Flip if using front, REMOVE if using back camera */
    }
    #camera-feed {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -2;
    }
  </style>
</head>
<body>

  <video id="video-input" playsinline></video>
  <canvas id="hand-canvas"></canvas>
  <video id="camera-feed" autoplay playsinline></video>

  <a-scene embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true; colorManagement: true;">
    
    <a-assets>
      <a-asset-item id="radio-model" src="old_radio.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 3 1"></a-entity>

    <a-camera position="0 1.6 0" look-controls="enabled: false">
        <a-cursor color="yellow"></a-cursor>
    </a-camera>

    <a-entity id="radio-group" position="0 1.2 -1.5">
      <a-entity gltf-model="#radio-model" scale="0.5 0.5 0.5"></a-entity>
      
      <a-entity position="0 0.6 0">
          <a-plane class="clickable" width="0.4" height="0.15" color="#333" position="-0.25 0 0" 
                   text="value: Song 1; align: center" onmouseenter="playSong('song1')"></a-plane>
          <a-plane class="clickable" width="0.4" height="0.15" color="#333" position="0.25 0 0" 
                   text="value: Song 2; align: center" onmouseenter="playSong('song2')"></a-plane>
      </a-entity>
    </a-entity>
  </a-scene>

  <audio id="audio-song1" src="825653__1love__1love_synth_unkown-undercurrents-[AudioTrimmer.com].wav"></audio>
  <audio id="audio-song2" src="Quantum Mechanics.mp3"></audio>

  <script>
    const audio1 = document.getElementById('audio-song1');
    const audio2 = document.getElementById('audio-song2');
    const canvasElement = document.getElementById('hand-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const videoElement = document.getElementById('video-input');
    const cameraBg = document.getElementById('camera-feed');
    const radioGroup = document.getElementById('radio-group');

    // SETUP BACK CAMERA
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" } 
    }).then(stream => {
        videoElement.srcObject = stream;
        cameraBg.srcObject = stream;
        videoElement.play();
    }).catch(err => alert("Camera error: " + err));

    function playSong(id) {
        audio1.pause(); audio2.pause();
        if(id === 'song1') audio1.play();
        if(id === 'song2') audio2.play();
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const landmarks of results.multiHandLandmarks) {
          // Draw Skeleton
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
          drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 2});

          // Move radio on Pinch
          const index = landmarks[8];
          const thumb = landmarks[4];
          const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);

          if (dist < 0.05) {
             // Coordinate mapping for back camera (no flip needed)
             const mX = (index.x * 4) - 2; 
             const mY = (1 - index.y) * 3;
             radioGroup.setAttribute('position', `${mX} ${mY} -1.5`);
          }
        }
      }
      canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        await hands.send({image: videoElement});
      }
    });
    camera.start();
  </script>
</body>
</html>
