<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android AR Studio</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    :root { --gold: #e5b13a; --glass: rgba(20, 20, 20, 0.9); }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; font-family: sans-serif; overflow: hidden; color: white; }
    
    model-viewer { width: 100%; height: 100%; background-color: #111; }

    /* Model Switcher at Top */
    .top-bar {
      position: absolute; top: 20px; width: 100%; display: flex; 
      justify-content: center; gap: 8px; z-index: 100;
    }
    .pill {
      background: #333; color: white; border: 1px solid #555;
      padding: 8px 15px; border-radius: 20px; font-size: 12px;
    }
    .pill.active { background: var(--gold); color: black; border-color: var(--gold); font-weight: bold; }

    /* Bottom Control Area */
    .controls {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; z-index: 100;
    }

    .music-box {
      background: var(--glass); padding: 15px; border-radius: 15px;
      text-align: center; border: 1px solid #333;
    }

    .ar-btn {
      background: #fff; color: #000; border: none; padding: 18px;
      border-radius: 50px; font-weight: bold; font-size: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* Debugger text so you can see what's wrong on your phone screen */
    #status-log {
      position: absolute; bottom: 5px; width: 100%; text-align: center;
      font-size: 10px; color: #777; pointer-events: none;
    }
  </style>
</head>
<body>

  <model-viewer 
    id="viewer"
    src="old_radio.glb" 
    ar 
    ar-modes="webxr scene-viewer" 
    camera-controls 
    ar-placement="floor"
    shadow-intensity="1">

    <div class="top-bar" id="model-list"></div>

    <div class="controls">
      <div class="music-box">
        <div id="song-name" style="margin-bottom:10px; font-weight:bold;">Die House</div>
        <div style="display:flex; gap:10px;">
          <button id="play-pause" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--gold);">Play</button>
          <button id="next-song" style="flex:1; padding:10px; border-radius:8px; border:none; background:#444; color:white;">Next</button>
        </div>
      </div>

      <button slot="ar-button" class="ar-btn">
        🚀 ENTER AR MODE
      </button>
    </div>

    <div id="status-log">Status: Ready</div>
  </model-viewer>

  <audio id="player" src="cuphead-ost-die-house-music.mp3"></audio>

  <script>
    const viewer = document.getElementById('viewer');
    const audio = document.getElementById('player');
    const status = document.getElementById('status-log');

    // 1. ADD NEW MODELS HERE
    const models = [
      { name: "Vintage Radio", file: "old_radio.glb" },
      { name: "Add Model 2", file: "model2.glb" }
    ];

    // 2. ADD NEW SONGS HERE
    const songs = [
      { name: "Die House", file: "cuphead-ost-die-house-music.mp3" },
      { name: "Quantum Mechanics", file: "quantum-mechanics.mp3" }
    ];

    // Build Model Switcher
    const bar = document.getElementById('model-list');
    models.forEach((m, i) => {
      const btn = document.createElement('div');
      btn.className = `pill ${i===0?'active':''}`;
      btn.innerText = m.name;
      btn.onclick = () => {
        viewer.src = m.file;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        status.innerText = "Loaded: " + m.name;
      };
      bar.appendChild(btn);
    });

    // Music Logic
    let currentSong = 0;
    document.getElementById('play-pause').onclick = () => {
      if(audio.paused) { audio.play(); document.getElementById('play-pause').innerText = "Pause"; }
      else { audio.pause(); document.getElementById('play-pause').innerText = "Play"; }
    };

    document.getElementById('next-song').onclick = () => {
      currentSong = (currentSong + 1) % songs.length;
      audio.src = songs[currentSong].file;
      document.getElementById('song-name').innerText = songs[currentSong].name;
      audio.play();
      document.getElementById('play-pause').innerText = "Pause";
    };

    // --- ANDROID DEBUGGING ---
    viewer.addEventListener('ar-status', (e) => {
      status.innerText = "AR Status: " + e.detail.status;
      if(e.detail.status === 'failed') {
        alert("AR launch failed. Ensure you are using HTTPS and Chrome on Android.");
      }
    });

    viewer.addEventListener('load', () => { status.innerText = "Model Loaded Successfully"; });
    viewer.addEventListener('error', (e) => { status.innerText = "Error: " + e.detail.type; });
  </script>
</body>
</html>
