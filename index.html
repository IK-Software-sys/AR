<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Radio AR Interface</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            font-family: sans-serif;
        }

        /* Hover UI for Audio */
        #radio-ui {
            background: rgba(0, 0, 0, 0.85);
            color: #00ffcc;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ffcc;
            text-align: center;
            width: 200px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        #track-name {
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls button {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 5px 10px;
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
        }

        .controls button:hover {
            background: #00ffcc;
            color: black;
        }

        /* Permission Button for Mobile */
        #start-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #00ffcc;
            color: black;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-prompt">CLICK TO START AR & AUDIO</div>

    <div id="radio-ui">
        <div id="track-name">Loading...</div>
        <div class="controls">
            <button id="btn-play">PLAY</button>
            <button id="btn-pause">PAUSE</button>
            <button id="btn-next">NEXT</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. Audio Setup ---
        const tracks = [
            { src: 'cuphead-ost-die-house-music.mp3', name: 'Cuphead - Die House' },
            { src: encodeURI('Quantum Mechanics.mp3'), name: 'Quantum Mechanics' }
        ];
        let currentIdx = 0;
        const audio = new Audio(tracks[currentIdx].src);
        
        const trackNameEl = document.getElementById('track-name');
        trackNameEl.textContent = tracks[currentIdx].name;

        document.getElementById('btn-play').addEventListener('click', () => audio.play());
        document.getElementById('btn-pause').addEventListener('click', () => audio.pause());
        document.getElementById('btn-next').addEventListener('click', () => {
            currentIdx = (currentIdx + 1) % tracks.length;
            audio.src = tracks[currentIdx].src;
            trackNameEl.textContent = tracks[currentIdx].name;
            audio.play();
        });

        // --- 2. Core Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const pointLight = new THREE.PointLight(0xffffff, 2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- 3. Accelerometer (AR Feel) Logic ---
        let targetRotation = new THREE.Euler(0, 0, 0);
        const startBtn = document.getElementById('start-prompt');

        function handleOrientation(event) {
            // Beta (tilt front/back), Gamma (tilt left/right)
            const x = THREE.MathUtils.degToRad(event.beta - 90); 
            const y = THREE.MathUtils.degToRad(event.gamma);
            targetRotation.set(x, y, 0);
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            // Request permission for iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });

        // --- 4. Load Model & Controls ---
        let radio;
        const loader = new GLTFLoader();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const uiDiv = document.getElementById('radio-ui');

        loader.load('old_radio.glb', (gltf) => {
            radio = gltf.scene;
            scene.add(radio);

            // Attach Hover UI
            const radioLabel = new CSS2DObject(uiDiv);
            radioLabel.position.set(0, 1.5, 0);
            radio.add(radioLabel);

            // Transform Controls (The 4 Arrows)
            const tControls = new TransformControls(camera, renderer.domElement);
            tControls.attach(radio);
            tControls.setMode('translate');
            scene.add(tControls);

            // Prevent AR camera movement while dragging the model
            tControls.addEventListener('dragging-changed', (e) => {
                isDragging = e.value;
            });
        });

        // --- 5. Interaction & Animation ---
        let isDragging = false;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Touch support for mobile hover effect
        window.addEventListener('touchstart', (e) => {
            mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);

            // Apply smooth AR camera tilt if not dragging
            if (!isDragging) {
                camera.rotation.x += (targetRotation.x - camera.rotation.x) * 0.05;
                camera.rotation.y += (targetRotation.y - camera.rotation.y) * 0.05;
            }

            // Raycasting for hover UI
            if (radio) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(radio, true);
                if (intersects.length > 0) {
                    uiDiv.style.opacity = '1';
                    uiDiv.style.pointerEvents = 'auto';
                } else {
                    uiDiv.style.opacity = '0';
                    uiDiv.style.pointerEvents = 'none';
                }
            }

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
