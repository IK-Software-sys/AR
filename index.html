<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Radio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* The Audio Controls UI */
        #radio-ui {
            background: rgba(20, 20, 20, 0.9);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            
            /* Hidden by default, revealed via JS */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            width: 220px;
        }

        #track-name {
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4CAF50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls button {
            background: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            margin: 0 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: #4CAF50;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="radio-ui">
        <div id="track-name">1. Die House (Cuphead OST)</div>
        <div class="controls">
            <button id="btn-play">▶ Play</button>
            <button id="btn-pause">⏸ Pause</button>
            <button id="btn-next">⏭ Next</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. Audio Setup ---
        const tracks = [
            { src: 'cuphead-ost-die-house-music.mp3', name: '1. Die House (Cuphead OST)' },
            { src: 'Quantum Mechanics.mp3', name: '2. Quantum Mechanics' }
        ];
        let currentTrackIdx = 0;
        const audio = new Audio(tracks[currentTrackIdx].src);
        audio.loop = true;

        const trackNameEl = document.getElementById('track-name');
        
        document.getElementById('btn-play').addEventListener('click', () => audio.play());
        document.getElementById('btn-pause').addEventListener('click', () => audio.pause());
        document.getElementById('btn-next').addEventListener('click', () => {
            currentTrackIdx = (currentTrackIdx + 1) % tracks.length;
            audio.src = tracks[currentTrackIdx].src;
            trackNameEl.textContent = tracks[currentTrackIdx].name;
            audio.play();
        });

        // --- 2. Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        // WebGL Renderer (For the 3D Model)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // CSS2D Renderer (For the HTML Overlay)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // Let clicks pass through to 3D scene initially
        document.body.appendChild(labelRenderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // General Camera Orbit Controls
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;

        // --- 3. Load Model & Add Controls ---
        let radioMesh = null;
        const loader = new GLTFLoader();
        
        loader.load('old_radio.glb', (gltf) => {
            radioMesh = gltf.scene;
            scene.add(radioMesh);

            // Add the UI element to float above the radio
            const uiDiv = document.getElementById('radio-ui');
            const uiObject = new CSS2DObject(uiDiv);
            uiObject.position.set(0, 1.5, 0); // Adjust Y value to float above your specific model
            radioMesh.add(uiObject);

            // Setup Transform Controls (The 4-Arrow Gizmo)
            // We attach it to the labelRenderer's DOM element so HTML clicks don't conflict
            const transformControls = new TransformControls(camera, labelRenderer.domElement);
            transformControls.attach(radioMesh);
            transformControls.setMode('translate'); // Sets it to the arrow mode for moving
            scene.add(transformControls);

            // Disable OrbitControls while dragging the radio so the camera doesn't spin
            transformControls.addEventListener('dragging-changed', (event) => {
                orbitControls.enabled = !event.value;
            });
        });

        // --- 4. Hover Detection (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const uiDiv = document.getElementById('radio-ui');
        let isHoveringUI = false;

        // Keep UI active if mouse is directly over the HTML panel
        uiDiv.addEventListener('mouseenter', () => isHoveringUI = true);
        uiDiv.addEventListener('mouseleave', () => isHoveringUI = false);

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // --- 5. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            orbitControls.update();

            // Check if mouse is hovering over the 3D radio
            if (radioMesh) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(radioMesh, true);
                
                // Show UI if hovering over 3D model OR hovering over the UI itself
                if (intersects.length > 0 || isHoveringUI) {
                    uiDiv.style.opacity = '1';
                    uiDiv.style.pointerEvents = 'auto'; // Make buttons clickable
                } else {
                    uiDiv.style.opacity = '0';
                    uiDiv.style.pointerEvents = 'none'; // Pass clicks through to scene
                }
            }

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
