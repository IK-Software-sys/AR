<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Radio Interface</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; }
        .controls { margin: 20px; }
        .button { margin: 5px; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>3D Radio Model</h1>
    <div class="controls">
        <button class="button" onclick="move('up')">↑</button>
        <button class="button" onclick="move('down')">↓</button>
        <button class="button" onclick="move('left')">←</button>
        <button class="button" onclick="move('right')">→</button>
    </div>
    <div class="audio-controls">
        <h2>Audio Controls</h2>
        <input type="range" min="0" max="100" value="50" id="volume" />
        <label for="volume">Volume</label>
    </div>
    <script>
        function move(direction) {
            console.log('Moving the radio', direction);
            // Add movement handling logic here
        }
    </script>
</body>
</html>
