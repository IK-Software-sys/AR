<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Radio Debugger</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #status-log { 
            position: absolute; top: 10px; left: 10px; 
            color: #0f0; background: rgba(0,0,0,0.8); 
            padding: 10px; font-size: 12px; z-index: 999;
            border-radius: 5px; pointer-events: none;
        }
        #css-container { position: absolute; top: 0; pointer-events: none; }
        .model-ui-wrapper {
            pointer-events: auto; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 12px; color: white;
            display: flex; flex-direction: column; gap: 10px;
        }
    </style>
</head>
<body>
    <div id="status-log">Initializing AR...</div>
    <div id="css-container"></div>
    <audio id="audio-player"></audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const log = document.getElementById('status-log');
        let camera, scene, renderer, labelRenderer, reticle, radioGroup;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // Check WebXR Support immediately
        if ('xr' in navigator) {
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (supported) {
                    log.innerText = "AR Supported. Use button at bottom.";
                    init();
                } else {
                    log.style.color = "red";
                    log.innerText = "AR NOT SUPPORTED: Device/Browser mismatch.";
                }
            });
        } else {
            log.style.color = "red";
            log.innerText = "AR NOT SUPPORTED: Use HTTPS and Chrome on Android.";
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Add the Button with specific AR features
            const arButton = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.body.appendChild(arButton);

            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('css-container').appendChild(labelRenderer.domElement);

            // Lighting
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // Placement Reticle
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.11, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            radioGroup = new THREE.Group();
            scene.add(radioGroup);

            // Load Model
            new GLTFLoader().load('old_radio.glb', (gltf) => {
                radioGroup.add(gltf.scene);
                radioGroup.visible = false;
                setupUI();
            });

            // Tap to place
            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', () => {
                if (reticle.visible) {
                    radioGroup.visible = true;
                    radioGroup.position.setFromMatrixPosition(reticle.matrix);
                    log.innerText = "Object Placed.";
                }
            });
            scene.add(controller);

            renderer.setAnimationLoop(render);
        }

        function setupUI() {
            const div = document.createElement('div');
            div.className = 'model-ui-wrapper';
            div.innerHTML = `<strong>RADIO CONTROLS</strong><br>
                             <button onclick="document.getElementById('audio-player').play()">Play</button>`;
            const ui = new CSS2DObject(div);
            ui.position.set(0, 0.4, 0);
            radioGroup.add(ui);
        }

        async function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
    </script>
</body>
</html>
