<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D AR Radio</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ar-instructions {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; z-index: 10; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        /* Hover UI for Radio */
        #radio-ui {
            background: rgba(0, 0, 0, 0.8);
            color: white; padding: 12px; border-radius: 10px;
            display: none; flex-direction: column; align-items: center;
        }
        .controls button {
            background: #444; color: white; border: none;
            padding: 8px 12px; margin: 5px; border-radius: 5px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ar-instructions">Scan the floor and tap to place the radio</div>
    
    <div id="radio-ui">
        <div id="track-name">Loading...</div>
        <div class="controls">
            <button id="btn-play">▶</button>
            <button id="btn-pause">⏸</button>
            <button id="btn-next">⏭</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let container, scene, camera, renderer, labelRenderer;
        let controller, reticle, radioMesh;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // --- Audio Setup ---
        const tracks = [
            { src: 'cuphead-ost-die-house-music.mp3', name: 'Die House' },
            { src: 'Quantum Mechanics.mp3', name: 'Quantum Mechanics' }
        ];
        let currentTrackIdx = 0;
        const audio = new Audio(tracks[currentTrackIdx].src);
        
        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Light
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // UI Renderer
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // Add AR Button (Camera Access)
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // Load Radio
            new GLTFLoader().load('old_radio.glb', (gltf) => {
                radioMesh = gltf.scene;
                radioMesh.visible = false; // Hide until user places it
                radioMesh.scale.set(0.5, 0.5, 0.5); // Scale down for AR
                scene.add(radioMesh);

                // Attach UI
                const uiDiv = document.getElementById('radio-ui');
                const uiObject = new CSS2DObject(uiDiv);
                uiObject.position.set(0, 0.8, 0); 
                radioMesh.add(uiObject);
                document.getElementById('track-name').innerText = tracks[0].name;
            });

            // The "Reticle" (The ring that follows the floor)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Placement logic
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Audio Controls
            document.getElementById('btn-play').onclick = () => audio.play();
            document.getElementById('btn-pause').onclick = () => audio.pause();
            document.getElementById('btn-next').onclick = () => {
                currentTrackIdx = (currentTrackIdx + 1) % tracks.length;
                audio.src = tracks[currentTrackIdx].src;
                document.getElementById('track-name').innerText = tracks[currentTrackIdx].name;
                audio.play();
            };
        }

        function onSelect() {
            if (reticle.visible && radioMesh) {
                radioMesh.visible = true;
                radioMesh.position.setFromMatrixPosition(reticle.matrix);
                document.getElementById('radio-ui').style.display = 'flex';
                // First song starts on placement
                if(audio.paused) audio.play(); 
            }
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
    </script>
</body>
</html>
