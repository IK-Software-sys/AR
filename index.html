<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 3D Radio - Sensor Driven</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Camera Feed Styling */
        #video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        #radio-ui {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            width: 180px;
            pointer-events: none;
        }

        .controls button {
            background: #444; color: white; border: none;
            padding: 5px 10px; margin: 2px; border-radius: 4px;
        }

        /* Permission Overlay for Sensors/Camera */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100;
        }
        #start-btn {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #4CAF50; border: none; border-radius: 8px; color: white;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <video id="video-background" autoplay playsinline></video>

    <div id="overlay">
        <h2>AR Radio Experience</h2>
        <p>This requires Camera and Motion Sensors</p>
        <button id="start-btn">Start AR</button>
    </div>

    <div id="radio-ui">
        <div id="track-name">Loading...</div>
        <div class="controls">
            <button id="btn-play">▶</button>
            <button id="btn-pause">⏸</button>
            <button id="btn-next">⏭</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let scene, camera, renderer, labelRenderer, radioMesh, transformControls;
        const video = document.getElementById('video-background');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');

        // --- Audio Logic ---
        const tracks = [
            { src: 'cuphead-ost-die-house-music.mp3', name: 'Die House' },
            { src: 'Quantum Mechanics.mp3', name: 'Quantum Mechanics' }
        ];
        let currentTrackIdx = 0;
        const audio = new Audio();
        
        function setupAudio() {
            audio.src = tracks[currentTrackIdx].src;
            document.getElementById('track-name').textContent = tracks[currentTrackIdx].name;
            
            document.getElementById('btn-play').onclick = () => audio.play();
            document.getElementById('btn-pause').onclick = () => audio.pause();
            document.getElementById('btn-next').onclick = () => {
                currentTrackIdx = (currentTrackIdx + 1) % tracks.length;
                audio.src = tracks[currentTrackIdx].src;
                document.getElementById('track-name').textContent = tracks[currentTrackIdx].name;
                audio.play();
            };
        }

        // --- Initialization ---
        async function initAR() {
            // 1. Camera Feed
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) { alert("Camera error: " + err); }

            // 2. Request Motion Permissions (Required for iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }

            setupAudio();
            initThree();
            overlay.style.display = 'none';
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            
            // Create a group to handle camera rotation via sensors
            const cameraGroup = new THREE.Group();
            cameraGroup.add(camera);
            scene.add(cameraGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2);
            scene.add(light);

            // Load Model
            new GLTFLoader().load('old_radio.glb', (gltf) => {
                radioMesh = gltf.scene;
                radioMesh.position.set(0, 0, -3); // Placed 3 meters in front
                scene.add(radioMesh);

                const uiDiv = document.getElementById('radio-ui');
                const uiObject = new CSS2DObject(uiDiv);
                uiObject.position.set(0, 0.8, 0);
                radioMesh.add(uiObject);

                transformControls = new TransformControls(camera, renderer.domElement);
                transformControls.attach(radioMesh);
                transformControls.setMode('translate');
                scene.add(transformControls);
            });

            // --- Sensor Logic (Accelerometer/Gyroscope) ---
            window.addEventListener('deviceorientation', (event) => {
                // Converting degrees to radians
                const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // Z
                const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;   // X
                const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // Y

                // Simple sensor mapping for AR effect
                cameraGroup.rotation.set(beta, gamma, alpha);
            });

            // Raycaster for Hover UI
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const uiDiv = document.getElementById('radio-ui');

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            function animate() {
                requestAnimationFrame(animate);
                
                if (radioMesh) {
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObject(radioMesh, true);
                    if (intersects.length > 0) {
                        uiDiv.style.opacity = '1';
                        uiDiv.style.pointerEvents = 'auto';
                    } else {
                        uiDiv.style.opacity = '0';
                        uiDiv.style.pointerEvents = 'none';
                    }
                }
                
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
        }

        startBtn.addEventListener('click', initAR);
    </script>
</body>
</html>
