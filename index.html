<!DOCTYPE html>
<html>
<head>
  <title>AR Radio: Fist to Summon</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #video-input, #camera-feed { position: absolute; width: 100vw; height: 100vh; object-fit: cover; }
    #video-input { display: none; }
    #hand-canvas { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 5; pointer-events: none; }
    #camera-feed { z-index: 1; }
    a-scene { position: absolute; z-index: 10; width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <video id="video-input"></video>
  <video id="camera-feed" autoplay playsinline></video>
  <canvas id="hand-canvas"></canvas>

  <a-scene embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true;">
    <a-assets>
      <a-asset-item id="radio-model" src="old_radio.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 1.6 0" look-controls="enabled: false">
        <a-cursor fuse="false" color="cyan"></a-cursor>
    </a-camera>

    <a-entity id="radio-group" position="0 1.5 -2" visible="false">
      <a-box size="0.2 0.2 0.2" material="wireframe: true; color: white" opacity="0.3"></a-box>
      
      <a-entity gltf-model="#radio-model" scale="1 1 1" rotation="0 180 0"></a-entity>
      
      <a-entity position="0 0.5 0">
        <a-plane class="clickable" width="0.4" height="0.15" color="#222" position="-0.25 0 0" text="value: Song 1; align: center" onmouseenter="playSong('song1')"></a-plane>
        <a-plane class="clickable" width="0.4" height="0.15" color="#222" position="0.25 0 0" text="value: Song 2; align: center" onmouseenter="playSong('song2')"></a-plane>
      </a-entity>
    </a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 1 1"></a-light>
  </a-scene>

  <audio id="audio-song1" src="825653__1love__1love_synth_unkown-undercurrents-[AudioTrimmer.com].wav"></audio>
  <audio id="audio-song2" src="Quantum Mechanics.mp3"></audio>

  <script>
    const radioGroup = document.getElementById('radio-group');
    const videoElement = document.getElementById('video-input');
    const cameraBg = document.getElementById('camera-feed');
    const canvasElement = document.getElementById('hand-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // 1. BACK CAMERA SETUP (NO MIRROR)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => { 
          videoElement.srcObject = stream; 
          cameraBg.srcObject = stream; 
      });

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    hands.onResults((results) => {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // DRAW SKELETON (Aligned for Back Camera)
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 3});

        // 2. COORDINATE MAPPING
        const indexTip = landmarks[8];
        const wrist = landmarks[0];
        
        // Map 0-1 to A-Frame space (-2 to 2)
        const targetX = (indexTip.x * 4) - 2;
        const targetY = (1 - indexTip.y) * 3;

        // 3. GESTURE DETECTION
        // Check if index, middle, and ring tips are close to the wrist (Fist)
        const isFist = landmarks[8].y > landmarks[6].y && 
                       landmarks[12].y > landmarks[10].y && 
                       landmarks[16].y > landmarks[14].y;

        if (isFist) {
          radioGroup.setAttribute('visible', 'true');
          radioGroup.setAttribute('position', `${targetX} ${targetY} -2`);
        }

        // 4. PINCH TO DRAG (Index & Thumb)
        const dist = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y);
        if (dist < 0.05) {
          radioGroup.setAttribute('position', `${targetX} ${targetY} -2`);
        }
      }
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        await hands.send({image: videoElement});
      }
    });
    camera.start();

    function playSong(s) {
      document.getElementById('audio-song1').pause();
      document.getElementById('audio-song2').pause();
      document.getElementById('audio-' + s).play();
    }
  </script>
</body>
</html>
